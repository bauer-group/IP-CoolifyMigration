# =============================================================================
#  🔒 Security Management
# -----------------------------------------------------------------------------
#  WHAT         : Secret scanning (gitleaks + GitGuardian) and dependency review.
#  WHEN         : Push, PR, and weekly.
#  PRODUCES     : Security findings; fails the build on a leaked credential.
#  WHY IT MATTERS HERE : this repo's users hold a Coolify root token, SSH private
#                 keys and APP_KEY. A credential committed here is a fleet-wide
#                 incident, not a repo-scoped one.
#  PERMISSIONS  : Must be granted here. A called workflow's `permissions:` block
#                 is a request ceiling, not a grant -- the token is minted from
#                 the caller's scopes. These three mirror what
#                 modules-security-scan.yml declares; dropping any fails at parse.
# =============================================================================
name: 🔒 Security Management

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security:
    uses: bauer-group/automation-templates/.github/workflows/modules-security-scan.yml@main
    with:
      scan-engine: 'both'
      scan-type: 'all'
    secrets: inherit
