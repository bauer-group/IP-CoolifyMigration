# =============================================================================
#  🔬 Integration Tests
# -----------------------------------------------------------------------------
#  WHAT         : Real sshd + real rsync + real files. Proves that a file owned
#                 by uid 999, with an xattr, a hardlink and a sparse hole,
#                 actually arrives intact.
#  WHEN         : Push to main, PRs touching transfer/, and nightly.
#  PRODUCES     : A pass/fail gate on the tool's central promise.
#  WHY SEPARATE : Needs Docker and takes longer than the unit gate, which must
#                 stay fast enough to run on every keystroke.
#  PERMISSIONS  : contents: read only.
# =============================================================================
name: 🔬 Integration Tests

on:
  push:
    branches: [main]
    paths: ['src/bg_coolify_migrate/transfer/**', 'tests/integration/**', '.github/workflows/integration.yml']
  pull_request:
    branches: [main]
    paths: ['src/bg_coolify_migrate/transfer/**', 'tests/integration/**']
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: 🔬 Real transfer
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: 📦 Install
        run: pip install -e ".[dev]"

      - name: 🔑 Mint rig keys
        run: python tests/integration/prepare.py

      - name: 🚢 Start the rig
        run: docker compose -f tests/integration/docker-compose.yml up -d --wait

      - name: 🔬 Test
        run: pytest tests/integration -m integration -q

      - name: 🧹 Tear down
        if: always()
        run: docker compose -f tests/integration/docker-compose.yml down -v
