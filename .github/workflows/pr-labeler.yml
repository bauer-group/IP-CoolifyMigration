# =============================================================================
#  🏷️ PR Labeler
# -----------------------------------------------------------------------------
#  WHAT         : Applies path- and content-based labels to pull requests.
#  WHEN         : PR opened/synchronised.
#  PRODUCES     : Labels used by triage and the changelog.
#  PERMISSIONS  : Granted here, mirroring the called workflow -- delegation does
#                 not work, the token is minted from this caller's scopes. Uses
#                 pull_request_target, which is safe here because the reusable
#                 workflow does NOT check out untrusted code.
# =============================================================================
name: 🏷️ PR Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    uses: bauer-group/automation-templates/.github/workflows/pr-labeler.yml@main
    secrets: inherit
