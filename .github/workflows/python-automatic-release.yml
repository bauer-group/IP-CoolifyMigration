# =============================================================================
#  🐍 CI/CD Pipeline (Automatic Release)
# -----------------------------------------------------------------------------
#  WHAT         : Semantic-release on every push to main: version bump, tag,
#                 changelog, build, publish, and regeneration of README.MD /
#                 SECURITY.MD from their templates.
#  WHEN         : Push to main; manual dispatch.
#  PRODUCES     : A GitHub release, a git tag vX.Y.Z, and a PyPI publish.
#  REQUIREMENTS : Org secrets, inherited.
#  PERMISSIONS  : Must be granted here -- a called workflow's `permissions:` block
#                 is a request ceiling, not a grant. Mirrors what
#                 python-semantic-release.yml declares. id-token is for PyPI
#                 trusted publishing; contents/issues/pull-requests for the tag,
#                 release notes and changelog commit.
# =============================================================================
name: 🐍 CI/CD Pipeline (Automatic Release)

on:
  push:
    branches: [main]
    paths-ignore: ['docs/**', '*.md', '*.MD']
  workflow_dispatch:
    inputs:
      skip-pypi:
        description: 'Build and tag but do not publish to PyPI'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  checks: write
  security-events: write
  actions: read

jobs:
  release:
    uses: bauer-group/automation-templates/.github/workflows/python-semantic-release.yml@main
    with:
      python-version: '3.14'
      run-tests: true
      run-security-scan: true
      security-engine: 'both'
      build-local-wheel: true
      skip-pypi: ${{ inputs.skip-pypi || false }}
      update-documentation: true
      # SECURITY.MD is rendered by scripts/generate-docs.py from our own
      # docs/SECURITY.template.MD. The org generator drives off a different
      # config + placeholder contract we don't use, so it hard-failed the
      # release with "template not found". We own this file; keep it off.
      update-security-policy: false
    secrets: inherit
