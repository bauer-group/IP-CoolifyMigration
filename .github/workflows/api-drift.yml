# =============================================================================
#  🔭 Coolify API Drift Watch
# -----------------------------------------------------------------------------
#  WHAT         : Re-validates our per-endpoint request whitelists (api/fields.py)
#                 against Coolify's openapi.json AT THE NEWEST RELEASE TAG.
#  WHEN         : Weekly, and on demand.
#  PRODUCES     : An issue when upstream adds a field we do not send.
#  WHY          : Coolify enforces $allowedFields and 422s on anything unknown,
#                 and our whitelists are transcribed from its source. When
#                 upstream changes, we want OUR ci to break — not someone's
#                 production migration, mid-cutover, with the source stopped.
#
#                 NOT `main`. It read `main` until 2.5.7, reported the unreleased
#                 `tags` field as missing, and that whitelisting broke every
#                 migration until the revert. Operators run releases.
#  REQUIREMENTS : GITHUB_TOKEN, for the releases/latest lookup — unauthenticated
#                 api.github.com is 60 req/h per IP and a throttled canary fails
#                 looking exactly like real drift.
#  PERMISSIONS  : contents: read, issues: write.
# =============================================================================
name: 🔭 Coolify API Drift Watch

on:
  schedule:
    - cron: '30 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: 🔭 Check upstream API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: 📦 Install
        run: pip install -e ".[dev]"

      - name: 🔭 Compare whitelists against the newest Coolify release
        id: drift
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pytest -q -m integration tests/test_api_fields.py
