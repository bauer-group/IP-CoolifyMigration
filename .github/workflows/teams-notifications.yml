# =============================================================================
#  📢 Teams Notifications
# -----------------------------------------------------------------------------
#  WHAT         : Posts releases and failures to Microsoft Teams.
#  WHEN         : Release published; workflow failures.
#  PRODUCES     : A Teams message.
#  PERMISSIONS  : Read-only, mirroring what the called workflow declares. Omitting
#                 the block does NOT inherit those reads -- the token is minted
#                 from this caller's scopes, and the repo default supplies none of
#                 them, so the workflow failed to start.
# =============================================================================
name: 📢 Teams Notifications

on:
  release:
    types: [published]
  workflow_run:
    workflows: ['🐍 CI/CD Pipeline (Automatic Release)', '🧪 Tests']
    types: [completed]

permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: read

jobs:
  notify:
    uses: bauer-group/automation-templates/.github/workflows/teams-notifications.yml@main
    secrets: inherit
